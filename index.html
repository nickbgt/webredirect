<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
        }

        .card {
            text-align: center;
            padding: 40px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Verbindung wird aufgebaut…</h2>
    <div class="spinner"></div>
    <div class="status" id="status">Initialisiere…</div>
</div>

<script>
async function run() {
    const status = document.getElementById('status')

    try {
        status.textContent = "Lade Zieladresse..."

        const res = await fetch('./link.txt?cache=' + Date.now())
        const url = (await res.text()).trim()

        if (!url.startsWith('http')) {
            throw new Error('Ungültige URL')
        }

        status.textContent = "Ziel erreichbar. Weiterleitung in 3 Sekunden..."

        // 3 Sekunden warten
        await new Promise(resolve => setTimeout(resolve, 3000))

        window.location.replace(url)

    } catch (e) {
        status.textContent = "Fehler. Neuer Versuch..."
        setTimeout(run, 2000)
    }
}

run()
</script>

</body>
</html>
