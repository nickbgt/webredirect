<script>
let currentUrl = null;

async function isReachable(url) {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 4000);

        const res = await fetch(url, {
            mode: 'no-cors',
            signal: controller.signal
        });

        clearTimeout(timeout);

        // Bei no-cors kannst du NICHT den Inhalt lesen
        // → nur: Request hat funktioniert = wahrscheinlich erreichbar
        return true;

    } catch (e) {
        return false;
    }
}

async function checkLink() {
    try {
        const res = await fetch('./link.txt?cache=' + Date.now());
        const url = (await res.text()).trim();

        if (!url.startsWith('http')) return;

        if (url !== currentUrl) {
            currentUrl = url;

            const reachable = await isReachable(url);

            if (reachable) {
                document.getElementById('status').textContent =
                    "Seite erreichbar. Weiterleitung in 3 Sekunden…";

                setTimeout(() => {
                    window.location.replace(url);
                }, 3000);

            } else {
                document.getElementById('status').textContent =
                    "Ziel nicht erreichbar. Warte...";
            }
        }

    } catch (e) {
        document.getElementById('status').textContent =
            "Warte auf gültigen Link…";
    }
}

setInterval(checkLink, 3000);
checkLink();
</script>
